<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Sound ID Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen p-4 sm:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="mb-6">
            <h1 class="text-2xl sm:text-3xl font-bold text-blue-400 flex items-center gap-2">🎵 Roblox Sound Detector</h1>
            <p class="text-gray-400 text-sm mt-1">Masukkan User ID Roblox untuk mendeteksi semua Sound Asset ID & Statusnya.</p>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 sm:p-6 shadow-xl">
            <div class="flex gap-3 mb-5">
                <input type="text" id="userIdInput" placeholder="Contoh: 10095778724"
                       class="flex-1 px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white text-sm">
                <button id="detectBtn" onclick="detectSounds()"
                        class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold transition text-sm whitespace-nowrap">
                    Detect
                </button>
            </div>

            <div id="status" class="text-center text-yellow-400 mb-4 hidden text-sm"></div>

            <div id="resultArea" class="hidden">
                <!-- Toolbar: search + filters -->
                <div class="flex flex-wrap gap-2 items-center justify-between mb-4">
                    <div class="flex flex-wrap gap-2 flex-1">
                        <input type="text" id="searchInput" oninput="renderTable()" placeholder="Search by name or asset ID..."
                               class="flex-1 min-w-[180px] px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <select id="statusFilter" onchange="renderTable()"
                                class="px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="all">All Status</option>
                            <option value="ACTIVE">✅ Active</option>
                            <option value="DELETED / COPYRIGHT (moderated)">❌ Copyright (moderated)</option>
                            <option value="DELETED / COPYRIGHT">❌ Deleted</option>
                            <option value="UNKNOWN / ERROR">❔ Unknown / Error</option>
                        </select>
                        <select id="sortOrder" onchange="renderTable()"
                                class="px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="newest">Terbaru</option>
                            <option value="oldest">Terlama</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="copyAllIds()" class="px-3 py-2 bg-green-600 hover:bg-green-700 rounded-lg text-sm font-medium whitespace-nowrap">Copy All IDs</button>
                        <button onclick="downloadCsv()" class="px-3 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg text-sm font-medium whitespace-nowrap">Download CSV</button>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-2 text-sm text-gray-400">
                    <span>Menampilkan <span id="shownCount">0</span> dari <span id="totalSounds">0</span> sounds</span>
                </div>

                <div class="max-h-[28rem] overflow-y-auto bg-gray-950 rounded-lg border border-gray-800">
                    <table class="w-full text-sm text-left border-collapse">
                        <thead class="bg-gray-800 sticky top-0 text-gray-300 text-xs uppercase tracking-wide">
                            <tr>
                                <th class="px-4 py-3">Asset ID</th>
                                <th class="px-4 py-3">Nama Sound</th>
                                <th class="px-4 py-3">Status</th>
                                <th class="px-4 py-3">Diupload</th>
                                <th class="px-4 py-3 text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="soundTableBody">
                            <!-- Data bakal masuk sini -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
